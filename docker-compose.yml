version: '3.8'

services:

  # ── Web server ──
  nginx:
    image: nginx:alpine
    container_name: kitu_nginx
    ports:
      - "8000:80"
    volumes:
      - ./laravel:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - kitu_network

  # ── Laravel (PHP 8.2) ──
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: kitu_php
    volumes:
      - ./laravel:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - kitu_network

  # ── PostgreSQL 15 ──
  postgres:
    image: postgres:15-alpine
    container_name: kitu_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - kitu_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kitu_network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: kitu_redis
    ports:
      - "6379:6379"
    networks:
      - kitu_network

  # ── Python ML service (FastAPI) ──
  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: kitu_ml
    volumes:
      - ./services/ml:/app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
    depends_on:
      - postgres
    networks:
      - kitu_network

networks:
  kitu_network:
    driver: bridge

volumes:
  kitu_postgres_data: